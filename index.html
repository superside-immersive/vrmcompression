<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM Previewer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      const appEntry = document.querySelector('script[type="module"][src]');
      const entrySrc = appEntry?.getAttribute('src') || '';
      const isSourceRootEntry = entrySrc.includes('/src/main.jsx') || entrySrc === './src/main.jsx';

      if (window.location.hostname.endsWith('github.io') && isSourceRootEntry) {
        window.location.replace(new URL('./docs/', window.location.href));
      }
    </script>
  </body>
</html>
